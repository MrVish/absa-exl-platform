name: python-validate

on:
  pull_request:
    paths:
      - "platform-contracts/**"
      - "registry/**"
      - "pipeline-factory/**"
      - "pipelines/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Types
        run: uv run mypy platform-contracts/src registry/api/src pipeline-factory/src
      - name: Tests
        run: uv run pytest
      - name: Contract model drift check
        run: |
          bash platform-contracts/regenerate-models.sh
          git diff --exit-code platform-contracts/src/platform_contracts/models.py
