# LocalStack CE container for the Phase 3 Sprint 1 demo.
# Spec section 4.1: image pinned to 3.8.1, ephemeral persistence,
# 5 services only (kms, s3, dynamodb, sts, iam).
# Multi-account simulation via x-localstack-account-id header (CE feature).

services:
  localstack:
    container_name: absa-exl-localstack
    image: localstack/localstack:3.8.1
    ports:
      - "4566:4566"
    environment:
      SERVICES: "kms,s3,dynamodb,sts,iam"
      DEBUG: "0"
      PERSISTENCE: "0"
      LOCALSTACK_AUTH_TOKEN: ""
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
